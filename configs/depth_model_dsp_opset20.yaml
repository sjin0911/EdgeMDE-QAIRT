model:
  name: depth_anything_v2_vits
  params:
    encoder: vits
    checkpoint_path: models/pytorch/depth_anything_v2_vits.pth
    dinov2_act_layer: gelu

input:
  shape: [1, 3, 518, 518]
  seed: 0

export:
  input_names: ["input"]
  output_names: ["output"]
  opset_version: 20
  dynamo: false
  output_path: models/onnx/depth_anything_v2_vits_518_dsp_gatherfix_opset20.onnx

validation:
  rtol: 1e-3
  atol: 1e-3

raw_input_dir: data/inputs_raw_fmt
output_dir: data/outputs
backend: dsp
quantize: true
