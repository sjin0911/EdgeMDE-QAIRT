model:
  name: simple_cnn
  params:
    in_channels: 3
    hidden_channels: 16
    out_channels: 1

input:
  shape: [1, 3, 224, 224]
  seed: 1234

export:
  output_path: models/onnx/simple_cnn.onnx
  input_names: [input]
  output_names: [output]
  opset_version: 17
  dynamo: false

validation:
  rtol: 0.001
  atol: 0.00001
